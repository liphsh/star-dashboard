<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星愿计划 ⭐</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFB347">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="星愿计划">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="styles.css?v=10">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 星星黑板 -->
        <div class="star-blackboard">
            <div class="blackboard-header">
                <div class="blackboard-title">
                    <span>📋</span>
                    <span>我的星星黑板</span>
                </div>
                <div class="star-total" onclick="showEditTotalModal()">
                    <span class="total-label">共</span>
                    <span class="total-count" id="starCount">0</span>
                    <span class="total-label">颗 ✏️</span>
                </div>
            </div>
            <div class="blackboard-content">
                <div class="stars-grid" id="starsGrid"></div>
                <div class="empty-blackboard" id="emptyBlackboard">
                    <span class="empty-icon">🌙</span>
                    <p>还没有星星哦~</p>
                    <p class="empty-hint">快去完成任务获得星星吧！</p>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons">
            <button class="action-btn add-btn" onclick="showAddModal()">
                <span class="btn-icon">➕</span>
                <span class="btn-text">获得星星</span>
            </button>
            <button class="action-btn remove-btn" onclick="showRemoveModal()">
                <span class="btn-icon">➖</span>
                <span class="btn-text">失去星星</span>
            </button>
        </div>

        <!-- 底部导航栏 -->
        <nav class="bottom-nav">
            <button class="nav-item" onclick="showWishList()">
                <span class="nav-icon">🎁</span>
                <span class="nav-label">我的心愿</span>
            </button>
            <button class="nav-item" onclick="showHistory()">
                <span class="nav-icon">📋</span>
                <span class="nav-label">记录</span>
            </button>
            <button class="nav-item" onclick="showMorePanel()">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">更多</span>
            </button>
        </nav>
    </div>

    <!-- 获得星星弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🌟 获得星星</h2>
                <button class="close-btn" onclick="closeModal('addModal')">✕</button>
            </div>
            <div class="modal-body">
                <p class="modal-hint">宝贝做到了什么呢？</p>
                <div class="reason-buttons">
                    <button class="reason-btn selected" data-reason="按时吃饭" onclick="selectReason(this, 'add')">
                        <span class="reason-icon">🍚</span>
                        <span>按时吃饭</span>
                    </button>
                    <button class="reason-btn" data-reason="按时睡觉" onclick="selectReason(this, 'add')">
                        <span class="reason-icon">😴</span>
                        <span>按时睡觉</span>
                    </button>
                    <button class="reason-btn" data-reason="参加运动" onclick="selectReason(this, 'add')">
                        <span class="reason-icon">⚽</span>
                        <span>参加运动</span>
                    </button>
                    <button class="reason-btn custom-btn" data-reason="custom" onclick="selectReason(this, 'add')">
                        <span class="reason-icon">✨</span>
                        <span>其他原因</span>
                    </button>
                </div>
                <div class="custom-input-area" id="addCustomArea" style="display: none;">
                    <input type="text" id="addCustomReason" placeholder="输入原因..." maxlength="50">
                </div>
                <div class="star-count-selector">
                    <p>奖励几颗星？</p>
                    <div class="count-options">
                        <button class="count-option selected" data-count="1">1⭐</button>
                        <button class="count-option" data-count="2">2⭐</button>
                        <button class="count-option" data-count="3">3⭐</button>
                    </div>
                </div>
                <button class="submit-btn add" onclick="submitAddStar()">
                    <span>⭐</span> 获得星星！
                </button>
            </div>
        </div>
    </div>

    <!-- 失去星星弹窗 -->
    <div class="modal" id="removeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>😢 失去星星</h2>
                <button class="close-btn" onclick="closeModal('removeModal')">✕</button>
            </div>
            <div class="modal-body">
                <p class="modal-hint">发生了什么呢？</p>
                <div class="reason-buttons">
                    <button class="reason-btn remove selected" data-reason="没按时吃饭" onclick="selectReason(this, 'remove')">
                        <span class="reason-icon">🍚</span>
                        <span>没按时吃饭</span>
                    </button>
                    <button class="reason-btn remove" data-reason="没按时睡觉" onclick="selectReason(this, 'remove')">
                        <span class="reason-icon">😴</span>
                        <span>没按时睡觉</span>
                    </button>
                    <button class="reason-btn remove" data-reason="没参加运动" onclick="selectReason(this, 'remove')">
                        <span class="reason-icon">⚽</span>
                        <span>没参加运动</span>
                    </button>
                    <button class="reason-btn remove custom-btn" data-reason="custom" onclick="selectReason(this, 'remove')">
                        <span class="reason-icon">📝</span>
                        <span>其他原因</span>
                    </button>
                </div>
                <div class="custom-input-area" id="removeCustomArea" style="display: none;">
                    <input type="text" id="removeCustomReason" placeholder="输入原因..." maxlength="50">
                </div>
                <div class="star-count-selector">
                    <p>扣除几颗星？</p>
                    <div class="count-options">
                        <button class="count-option selected" data-count="1">1⭐</button>
                        <button class="count-option" data-count="2">2⭐</button>
                        <button class="count-option" data-count="3">3⭐</button>
                    </div>
                </div>
                <button class="submit-btn remove" onclick="submitRemoveStar()">
                    <span>💔</span> 确认扣除
                </button>
            </div>
        </div>
    </div>

    <!-- 修改星星总数弹窗 -->
    <div class="modal" id="editTotalModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ 修改星星总数</h2>
                <button class="close-btn" onclick="closeModal('editTotalModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="edit-total-area">
                    <span class="edit-star">⭐</span>
                    <input type="number" class="edit-total-input" id="editTotalInput" value="0" min="0" inputmode="numeric" onclick="this.select()">
                    <span class="edit-unit">颗</span>
                </div>
                <p class="edit-hint">直接输入正确的星星数量</p>
                <button class="submit-btn add" onclick="submitEditTotal()">
                    <span>✅</span> 确认修改
                </button>
            </div>
        </div>
    </div>

    <!-- 历史记录弹窗 -->
    <div class="modal" id="historyModal">
        <div class="modal-content history-modal">
            <div class="modal-header">
                <h2>📋 星星记录</h2>
                <button class="close-btn" onclick="closeModal('historyModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="history-filter">
                    <button class="filter-btn active" onclick="filterHistory('all')">全部</button>
                    <button class="filter-btn" onclick="filterHistory('add')">获得</button>
                    <button class="filter-btn" onclick="filterHistory('remove')">失去</button>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>

    <!-- 更多功能面板 -->
    <div class="modal" id="morePanel">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ 更多</h2>
                <button class="close-btn" onclick="closeModal('morePanel')">✕</button>
            </div>
            <div class="modal-body">
                <div class="more-list">
                    <button class="more-item" onclick="closeModal('morePanel');exportData()">
                        <span class="more-icon">💾</span>
                        <span class="more-text">备份数据</span>
                        <span class="more-desc">导出数据到文件</span>
                    </button>
                    <button class="more-item" onclick="closeModal('morePanel');importData()">
                        <span class="more-icon">📂</span>
                        <span class="more-text">恢复数据</span>
                        <span class="more-desc">从备份文件恢复</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 心愿列表弹窗 -->
    <div class="modal" id="wishListModal">
        <div class="modal-content wish-modal">
            <div class="modal-header">
                <h2>🎁 我的心愿</h2>
                <button class="close-btn" onclick="closeModal('wishListModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="wish-star-info">
                    <span>⭐</span>
                    <span>当前拥有 <strong id="wishCurrentStars">0</strong> 颗星星</span>
                </div>
                <div class="wish-list" id="wishList"></div>
                <button class="add-wish-btn" onclick="showAddWishModal()">
                    <span>✨</span> 许一个新心愿
                </button>
                <button class="view-fulfilled-btn" onclick="showFulfilledWishes()">
                    <span>🏆</span> 已实现的心愿
                </button>
            </div>
        </div>
    </div>

    <!-- 添加/编辑心愿弹窗 -->
    <div class="modal" id="addWishModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="wishModalTitle">✨ 许个心愿</h2>
                <button class="close-btn" onclick="closeModal('addWishModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="wish-form">
                    <div class="form-group">
                        <label>🌈 我的心愿是...</label>
                        <input type="text" id="wishNameInput" placeholder="例如：去游乐园玩" maxlength="30">
                    </div>
                    <div class="form-group">
                        <label>⭐ 需要积攒多少颗星星？</label>
                        <div class="star-amount-input">
                            <button class="amount-btn" onclick="adjustWishAmount(-5)">-5</button>
                            <button class="amount-btn" onclick="adjustWishAmount(-1)">-1</button>
                            <input type="number" id="wishAmountInput" value="10" min="1" max="999">
                            <button class="amount-btn" onclick="adjustWishAmount(1)">+1</button>
                            <button class="amount-btn" onclick="adjustWishAmount(5)">+5</button>
                        </div>
                        <div class="amount-presets">
                            <span onclick="setWishAmount(5)">5颗</span>
                            <span onclick="setWishAmount(10)">10颗</span>
                            <span onclick="setWishAmount(20)">20颗</span>
                            <span onclick="setWishAmount(30)">30颗</span>
                            <span onclick="setWishAmount(50)">50颗</span>
                        </div>
                    </div>
                    <input type="hidden" id="editWishId" value="">
                    <button class="save-wish-btn" onclick="saveWish()">
                        <span>💫</span> 保存心愿
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 兑现心愿确认弹窗 -->
    <div class="modal" id="fulfillWishModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🎉 实现心愿</h2>
                <button class="close-btn" onclick="closeModal('fulfillWishModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="fulfill-content">
                    <div class="fulfill-wish-name" id="fulfillWishName"></div>
                    <div class="fulfill-cost">
                        <span>需要消耗</span>
                        <span class="cost-amount" id="fulfillCost">10</span>
                        <span>颗星星</span>
                    </div>
                    <div class="fulfill-remaining">
                        <span>剩余星星：</span>
                        <span id="fulfillRemaining">5</span>
                        <span>颗</span>
                    </div>
                    <input type="hidden" id="fulfillWishId" value="">
                    <div class="fulfill-buttons">
                        <button class="cancel-btn" onclick="closeModal('fulfillWishModal')">再等等</button>
                        <button class="confirm-fulfill-btn" onclick="confirmFulfillWish()">
                            <span>🎁</span> 实现心愿！
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 已实现心愿列表弹窗 -->
    <div class="modal" id="fulfilledWishesModal">
        <div class="modal-content wish-modal">
            <div class="modal-header">
                <h2>🏆 已实现的心愿</h2>
                <button class="close-btn" onclick="closeModal('fulfilledWishesModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="fulfilled-list" id="fulfilledWishList"></div>
            </div>
        </div>
    </div>

    <!-- 星星动画容器 -->
    <div class="star-animation-container" id="starAnimationContainer"></div>
    <div class="toast" id="toast"></div>

    <script src="app.js?v=10"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(r => console.log('SW registered:', r.scope))
                    .catch(e => console.log('SW failed:', e));
            });
        }
    </script>
</body>
</html>
